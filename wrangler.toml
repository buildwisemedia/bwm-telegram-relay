name = "bwm-telegram-relay"
main = "src/index.ts"
compatibility_date = "2025-04-25"
account_id = "ba00448499190431e6e4a00820f2200d"
workers_dev = true

[triggers]
# Heartbeat every 15 min — watchdog threshold is 2× interval = 30 min staleness max.
crons = ["*/15 * * * *"]

[[kv_namespaces]]
binding = "BWM_TELEGRAM_KV"
id = "ab6c7f536e92480d877341b28e551d15"

[[services]]
binding = "CRED_BROKER"
service = "bwm-cred-broker"

# Forward inbound Robert messages to bwm-attention-router for classification
# (PROJ-ATTN-ROUTING-001 Phase 6). Non-blocking via ctx.waitUntil.
[[services]]
binding = "ATTENTION_ROUTER"
service = "bwm-attention-router"

# Forward inbound Robert messages to bwm-content-classifier for content
# tagging (brand/strategy/lock/decision/idea/todo). Sibling of attention-router;
# tagged content routes to Brain inbox/telegram-YYYY-MM-DD.md automatically.
# PROJ-TELEGRAM-MIGRATION-001 Phase 0 / Chip 7b. Non-blocking via ctx.waitUntil.
[[services]]
binding = "CONTENT_CLASSIFIER"
service = "bwm-content-classifier"

[vars]
ENVIRONMENT = "production"

[observability]
enabled = true

# Secrets (set via `wrangler secret put`):
#   BROKER_BEARER                — bearer token for bwm-cred-broker auth
#   BWM_INTERNAL_KEY             — X-BWM-Internal-Key for /send legacy route
#   ATTENTION_ROUTER_KEY         — X-BWM-Internal-Key for bwm-attention-router /classify
#   TELEGRAM_WEBHOOK_SECRET      — X-Telegram-Bot-Api-Secret-Token from Telegram
#   TELEGRAM_RELAY_ADMIN_HMAC    — pre-image secret for /test admin HMAC
#   SUPABASE_URL                 — https://lscifhwmmkjiobnthlak.supabase.co
#   SUPABASE_SERVICE_KEY         — sb_secret_* for operational_events heartbeat writes
#   BRAIN_KEY                    — x-brain-key read token for brain.buildwisemedia.com
#                                  (enables directive handler to read Attention-Routing-Spec.md)
#   BRAIN_WRITE_KEY              — x-write-key token for brain.buildwisemedia.com /write
#                                  (enables directive handler to append silent_handle overrides)
#
# TELEGRAM_BOT_TOKEN is minted via CRED_BROKER at runtime — not stored as a direct secret here.
